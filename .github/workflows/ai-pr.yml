name: CI

on:
  workflow_dispatch:
    inputs:
      patch:
        description: 'The patch to apply'
        required: true

jobs:
  apply_patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Apply patch
        env:
          PATCH: ${{ github.event.inputs.patch }}
        run: |
          printf '%s' "$PATCH" > patch.diff
          cat patch.diff
          # Validate patch headers
          if ! grep -q -E '^diff --git |^--- |^+++ ' patch.diff; then
            echo "Invalid patch format"
            exit 1
          fi
          git apply --verbose patch.diff
