name: AI Audit Loop

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger AI Audit
        run: |
          curl https://api.openai.com/v1/responses \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-4.1",
              "input": "Run a full audit and create a PR with the highest impact improvements."
            }'
